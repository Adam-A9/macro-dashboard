name: Economic Calendar Scraper

# Schedule: runs twice daily at optimal times for US economic data
#   06:00 AM ET (11:00 UTC) — before US markets open, captures overnight updates
#   04:00 PM ET (21:00 UTC) — after most releases, captures actuals & next-day consensus
on:
  schedule:
    - cron: '0 11 * * 1-5'   # 6:00 AM ET, weekdays only
    - cron: '0 21 * * 1-5'   # 4:00 PM ET, weekdays only
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python python/scraper.py
